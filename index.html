<!DOCTYPE html>
<html lang="en">
<head>

        body {

            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .vault-box {
            background: #141414;
            padding: 40px;
            border: 1px solid #3e362e;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);

            padding: 12px;
            background: #000;
            border: 1px solid #3e362e;
            color: #a3be8c;
            text-align: center;
            font-size: 1.1em;
            box-sizing: border-box;

        }
        button {

            color: #d4c4a8;
            padding: 12px 0;
            width: 100%;
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover { background: #5a4d41; color: #fff; }
        .status-text { 
            font-size: 0.6em; 
            color: #444; 
            margin-top: 25px; 
            letter-spacing: 1px; 
            line-height: 1.5;
            text-align: left;
            border-top: 1px solid #222;

</html>
