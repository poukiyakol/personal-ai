<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boumaza AI Portal</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #d4c4a8;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .vault-box {
            background: #1a1a1a;
            padding: 40px;
            border: 1px solid #3e362e;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            border-radius: 5px;
        }
        input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 10px;
            background: #000;
            border: 1px solid #3e362e;
            color: #0f0; /* Matrix Green for typing */
            text-align: center;
        }
        button {
            background: #3e362e;
            color: #d4c4a8;
            padding: 10px 30px;
            border: none;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
        }
        button:hover { background: #5a4d41; }
        .status { font-size: 0.7em; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

<div class="vault-box">
    <h2>[ BOUMAZA_VAULT ]</h2>
    <p>IDENTITY VERIFICATION REQUIRED</p>
    
    <input type="text" id="surname" placeholder="ENTER SURNAME">
    <input type="password" id="passkey" placeholder="ACCESS CODE">
    
    <button onclick="unlock()">DECRYPT & ENTER</button>
    
    <div class="status">GATEWAY: ACTIVE<br>TUNNEL: SECURE</div>
</div>

<script>
    function unlock() {
        const s = document.getElementById('surname').value.toLowerCase();
        const p = document.getElementById('passkey').value;
        
        // YOUR FAMILY CREDENTIALS
        if (s === "boumaza" && p === "Family2026") {
            // REDIRECT TO YOUR LIVE TUNNEL
            window.location.href = "https://reader-changing-pcs-civilian.trycloudflare.com";
        } else {
            alert("CREDENTIALS REJECTED. ACCESS DENIED.");
        }
    }
</script>

</body>
</html>
